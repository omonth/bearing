
services:
  postgres:
    image: postgres:15-alpine
    container_name: bearing-sales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bearing_sales
      POSTGRES_USER: bearing_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bearing_sales_pwd_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/crm.sql:/docker-entrypoint-initdb.d/02_crm.sql
      - ./backend/db/payment.sql:/docker-entrypoint-initdb.d/03_payment.sql
      - ./backend/db/notifications.sql:/docker-entrypoint-initdb.d/04_notifications.sql
      - ./backend/db/supply_chain.sql:/docker-entrypoint-initdb.d/05_supply_chain.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bearing_admin -d bearing_sales"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bearing-sales-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pwd_2024}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bearing-sales-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bearing_sales
      DB_USER: bearing_admin
      DB_PASSWORD: ${DB_PASSWORD:-bearing_sales_pwd_2024}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pwd_2024}
      JWT_SECRET: ${JWT_SECRET:-bearing-jwt-secret-change-in-production-min-32-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      GRAY_RELEASE_ENABLED: ${GRAY_RELEASE_ENABLED:-false}
      GRAY_RELEASE_PERCENTAGE: ${GRAY_RELEASE_PERCENTAGE:-0}
      GRAY_RELEASE_VARIANT: ${GRAY_RELEASE_VARIANT:-canary}
      GRAY_RELEASE_FORCE_HEADER: ${GRAY_RELEASE_FORCE_HEADER:-x-gray-release}
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bearing-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: bearing-sales-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      - bearing-network

  nginx:
    image: nginx:alpine
    container_name: bearing-sales-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - bearing-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local

networks:
  bearing-network:
    driver: bridge
