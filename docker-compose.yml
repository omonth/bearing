
services:
  # ── Vector Service (Python + turbovec + bge-base-zh-v1.5) ────────────────
  vector-service:
    image: ${VECTOR_SERVICE_IMAGE:-bearing-sales-vector:local}
    build:
      context: ./backend/vector-service
      dockerfile: Dockerfile
    container_name: bearing-sales-vector
    restart: unless-stopped
    environment:
      EMBEDDING_MODEL: BAAI/bge-base-zh-v1.5
      BIT_WIDTH: "2"
      DIM: "768"
      INDEX_DIR: /app/data
    volumes:
      - vector_data:/app/data
    ports:
      - "127.0.0.1:5050:5050"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 3

  postgres:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    container_name: bearing-sales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bearing_sales}
      POSTGRES_USER: ${DB_USER:-bearing_admin}
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env.production or the shell}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: bearing-sales-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production or the shell}"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production or the shell}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-bearing-sales-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bearing-sales-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bearing_sales}
      DB_USER: ${DB_USER:-bearing_admin}
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env.production or the shell}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production or the shell}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env.production or the shell}"
      AI_JWT_SECRET: "${AI_JWT_SECRET:?Set AI_JWT_SECRET in .env.production or the shell}"
      INITIAL_ADMIN_USERNAME: "${INITIAL_ADMIN_USERNAME:?Set INITIAL_ADMIN_USERNAME in .env.production or the shell}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD in .env.production or the shell}"
      AI_BOOTSTRAP_USERNAME: "${AI_BOOTSTRAP_USERNAME:?Set AI_BOOTSTRAP_USERNAME in .env.production or the shell}"
      AI_BOOTSTRAP_PASSWORD: "${AI_BOOTSTRAP_PASSWORD:?Set AI_BOOTSTRAP_PASSWORD in .env.production or the shell}"
      PAYMENT_MODE: "${PAYMENT_MODE:?Set PAYMENT_MODE=production in .env.production or the shell}"
      CORS_ORIGIN: "${CORS_ORIGIN:?Set CORS_ORIGIN in .env.production or the shell}"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:?Set an HTTPS operational alert webhook}"
      ALERT_WEBHOOK_TIMEOUT_MS: ${ALERT_WEBHOOK_TIMEOUT_MS:-3000}
      CALLBACK_SIGNATURE_FAILURE_THRESHOLD: ${CALLBACK_SIGNATURE_FAILURE_THRESHOLD:-5}
      ALERT_HTTP_WINDOW_SIZE: ${ALERT_HTTP_WINDOW_SIZE:-100}
      ALERT_HTTP_MIN_SAMPLES: ${ALERT_HTTP_MIN_SAMPLES:-20}
      ALERT_ERROR_RATE_THRESHOLD: ${ALERT_ERROR_RATE_THRESHOLD:-0.05}
      ALERT_LATENCY_THRESHOLD_MS: ${ALERT_LATENCY_THRESHOLD_MS:-2000}
      CUSTOMER_SECURITY_PEPPER: "${CUSTOMER_SECURITY_PEPPER:?Set a strong customer challenge pepper}"
      CUSTOMER_NOTIFICATION_WEBHOOK_URL: "${CUSTOMER_NOTIFICATION_WEBHOOK_URL:?Set the HTTPS customer notification gateway URL}"
      CUSTOMER_NOTIFICATION_WEBHOOK_TOKEN: "${CUSTOMER_NOTIFICATION_WEBHOOK_TOKEN:?Set the customer notification gateway token}"
      GRAY_RELEASE_ENABLED: ${GRAY_RELEASE_ENABLED:-false}
      GRAY_RELEASE_PERCENTAGE: ${GRAY_RELEASE_PERCENTAGE:-0}
      GRAY_RELEASE_VARIANT: ${GRAY_RELEASE_VARIANT:-canary}
      GRAY_RELEASE_FORCE_HEADER: ${GRAY_RELEASE_FORCE_HEADER:-x-gray-release}
      VECTOR_SERVICE_URL: http://vector-service:5050
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      ALIPAY_MODE: ${ALIPAY_MODE:-production}
      ALIPAY_APP_CERT_PATH: ${ALIPAY_APP_CERT_PATH:-}
      ALIPAY_ALIPAY_CERT_PATH: ${ALIPAY_ALIPAY_CERT_PATH:-}
      ALIPAY_ROOT_CERT_PATH: ${ALIPAY_ROOT_CERT_PATH:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_API_KEY_V3: ${WECHAT_API_KEY_V3:-}
      WECHAT_CERT_SERIAL: ${WECHAT_CERT_SERIAL:-}
      WECHAT_PRIVATE_KEY: ${WECHAT_PRIVATE_KEY:-}
      WECHAT_MERCHANT_PUBLIC_KEY: ${WECHAT_MERCHANT_PUBLIC_KEY:-}
      WECHAT_NOTIFY_URL: ${WECHAT_NOTIFY_URL:-}
      WECHAT_PLATFORM_CERT_PATH: ${WECHAT_PLATFORM_CERT_PATH:-}
      WECHAT_CALLBACK_MAX_AGE_SECONDS: ${WECHAT_CALLBACK_MAX_AGE_SECONDS:-300}
      UNIONPAY_MERCHANT_ID: ${UNIONPAY_MERCHANT_ID:-}
      UNIONPAY_CERT_PATH: ${UNIONPAY_CERT_PATH:-}
      UNIONPAY_CERT_PWD: ${UNIONPAY_CERT_PWD:-}
      UNIONPAY_VERIFY_CERT_PATH: ${UNIONPAY_VERIFY_CERT_PATH:-}
      UNIONPAY_ENCRYPT_CERT_PATH: ${UNIONPAY_ENCRYPT_CERT_PATH:-}
      UNIONPAY_NOTIFY_URL: ${UNIONPAY_NOTIFY_URL:-}
      UNIONPAY_FRONT_URL: ${UNIONPAY_FRONT_URL:-}
      UNIONPAY_MODE: ${UNIONPAY_MODE:-production}
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/public/images
      - type: bind
        source: "${PAYMENT_CERTIFICATES_DIR:?Set the host payment certificate directory}"
        target: /run/secrets/payment-certificates
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vector-service:
        condition: service_healthy
    networks:
      - bearing-network

  frontend:
    image: ${FRONTEND_IMAGE:-bearing-sales-frontend:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: bearing-sales-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      PUBLIC_SITE_URL: "${PUBLIC_SITE_URL:?Set the canonical HTTPS PUBLIC_SITE_URL}"
      INTERNAL_API_URL: http://backend:3001/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bearing-network

  # Scheduled by ops/backup/systemd/bearing-postgres-backup.timer. The profile
  # keeps this one-shot job out of the web topology while sharing its immutable
  # backend image and PostgreSQL network.
  backup:
    profiles: ["ops"]
    image: ${BACKEND_IMAGE:-bearing-sales-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: ["node", "backup.js"]
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bearing_sales}
      DB_USER: ${DB_USER:-bearing_admin}
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env.production or the shell}"
      BACKUP_DIR: /app/backups
      BACKUP_ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_S3_BUCKET: "${BACKUP_S3_BUCKET:?Set the offsite backup bucket}"
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-bearing-sales/postgres}
      BACKUP_S3_REGION: "${BACKUP_S3_REGION:?Set the offsite backup region}"
      BACKUP_S3_ENDPOINT: "${BACKUP_S3_ENDPOINT:?Set the HTTPS S3-compatible endpoint}"
      BACKUP_ALERT_WEBHOOK_URL: "${BACKUP_ALERT_WEBHOOK_URL:?Set the HTTPS backup alert webhook}"
      AWS_SHARED_CREDENTIALS_FILE: /run/secrets/backup_aws_credentials
    secrets:
      - backup_encryption_key
      - backup_aws_credentials
    volumes:
      - encrypted_backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bearing-network

  admin:
    image: ${ADMIN_IMAGE:-bearing-sales-admin:local}
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: bearing-sales-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bearing-network

  nginx:
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    container_name: bearing-sales-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      admin:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - bearing-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  vector_data:
    driver: local
  encrypted_backups:
    driver: local

secrets:
  backup_encryption_key:
    file: "${BACKUP_ENCRYPTION_KEY_PATH:?Set the host path to a 0600 base64 backup key file}"
  backup_aws_credentials:
    file: "${BACKUP_AWS_CREDENTIALS_PATH:?Set the host path to a 0600 AWS credentials file}"

networks:
  bearing-network:
    driver: bridge
