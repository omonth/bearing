version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: bearing-sales-db
    environment:
      POSTGRES_DB: bearing_sales
      POSTGRES_USER: ${DB_USER:-bearing_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bearing_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: bearing-sales-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - bearing-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 后端API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bearing-sales-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bearing_sales
      DB_USER: ${DB_USER:-bearing_admin}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/backups:/app/backups
      - ./backend/bearings.db:/app/bearings.db
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bearing-network
    restart: unless-stopped

  # 前端应用
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bearing-sales-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bearing-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bearing-network:
    driver: bridge
