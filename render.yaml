services:
  - type: web
    name: bearing-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: AI_JWT_SECRET
        generateValue: true
      - key: INITIAL_ADMIN_USERNAME
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: AI_BOOTSTRAP_USERNAME
        sync: false
      - key: AI_BOOTSTRAP_PASSWORD
        sync: false
      - key: PAYMENT_MODE
        value: production
      - key: DB_TYPE
        value: postgres
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: GRAY_RELEASE_ENABLED
        value: "false"
      - key: GRAY_RELEASE_PERCENTAGE
        value: "0"
      - key: GRAY_RELEASE_VARIANT
        value: canary
      - key: GRAY_RELEASE_FORCE_HEADER
        value: x-gray-release
