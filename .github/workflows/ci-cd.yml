name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
      fail-fast: true

    steps:
    - uses: actions/checkout@v4

    - name: 使用 Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 安装前端依赖
      run: npm ci

    - name: 安装后端依赖
      run: cd backend && npm ci

    - name: 安装管理后台依赖
      run: cd admin && npm ci

    - name: 运行前端测试
      run: npm test

    - name: 运行后端测试
      run: cd backend && npm test

    - name: 运行管理后台测试
      run: cd admin && npm test

    - name: 构建前端
      run: npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: 检查 Docker Hub 密钥
      id: guard
      env:
        USER: ${{ secrets.DOCKER_USERNAME }}
      run: |
        if [ -n "$USER" ]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
        else
          echo "Docker Hub 密钥未配置，跳过镜像构建"
          echo "enabled=false" >> $GITHUB_OUTPUT
        fi

    - name: 设置Docker Buildx
      if: steps.guard.outputs.enabled == 'true'
      uses: docker/setup-buildx-action@v2

    - name: 登录Docker Hub
      if: steps.guard.outputs.enabled == 'true'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 构建并推送后端镜像
      if: steps.guard.outputs.enabled == 'true'
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/bearing-sales-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/bearing-sales-backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bearing-sales-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bearing-sales-backend:buildcache,mode=max

    - name: 构建并推送前端镜像
      if: steps.guard.outputs.enabled == 'true'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/bearing-sales-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/bearing-sales-frontend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bearing-sales-frontend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bearing-sales-frontend:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: 检查部署密钥
      id: guard
      env:
        HOST: ${{ secrets.DEPLOY_HOST }}
      run: |
        if [ -n "$HOST" ]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
        else
          echo "部署密钥未配置，跳过部署"
          echo "enabled=false" >> $GITHUB_OUTPUT
        fi

    - name: 部署到服务器
      if: steps.guard.outputs.enabled == 'true'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /opt/bearing-sales
          docker-compose pull
          docker-compose up -d
          docker system prune -f
