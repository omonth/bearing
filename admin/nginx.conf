server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /admin/;
    }

    location = /admin {
        return 308 /admin/;
    }

    # Hashed Vite assets must resolve to a real file. Never return the SPA
    # document for a missing JavaScript, stylesheet, font, or image.
    location ^~ /admin/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Client-side routes (for example /admin/login) fall back to the admin SPA.
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }
}
